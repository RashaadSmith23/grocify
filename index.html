<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocify - Smart Grocery List</title>
  <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">&#129382;</span>
          <h1>Grocify</h1>
        </div>
        <div class="header-stats">
          <span class="stat-item">
            <span class="stat-count" id="totalCount">0</span>
            <span class="stat-label">Items</span>
          </span>
          <span class="stat-divider"></span>
          <span class="stat-item">
            <span class="stat-count" id="purchasedCount">0</span>
            <span class="stat-label">Bought</span>
          </span>
        </div>
      </div>
      <div class="search-bar">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Search grocery list..." autocomplete="off">
        <button class="btn-icon" id="clearSearchBtn" title="Clear search">&times;</button>
      </div>
    </header>

    <main class="main">
      <section class="add-section">
        <form id="addForm" class="add-form">
          <div class="add-row">
            <input type="text" id="itemInput" placeholder="Add item (e.g., Milk, Apples)" autocomplete="off" required>
            <div class="add-controls">
              <div class="qty-wrapper">
                <label for="qtyInput" class="qty-label">Qty</label>
                <input type="number" id="qtyInput" value="1" min="1" max="99">
              </div>
              <div class="category-wrapper">
                <select id="categorySelect">
                  <option value="Other">Other</option>
                  <option value="Produce">Produce</option>
                  <option value="Dairy">Dairy</option>
                  <option value="Meat">Meat</option>
                  <option value="Bakery">Bakery</option>
                  <option value="Frozen">Frozen</option>
                  <option value="Pantry">Pantry</option>
                  <option value="Beverages">Beverages</option>
                  <option value="Household">Household</option>
                </select>
              </div>
              <button type="button" class="btn btn-sm btn-outline" id="imageToggleBtn" title="Add image">&#128247;</button>
              <button type="submit" class="btn btn-primary" id="addBtn">Add</button>
            </div>
          </div>
          <div class="add-image-row" id="addImageRow" style="display:none">
            <div class="image-input-group">
              <input type="text" id="imageUrlInput" placeholder="Paste image URL..." autocomplete="off">
              <span class="image-input-divider">or</span>
              <label class="btn btn-sm btn-outline upload-label">
                Browse Files
                <input type="file" id="fileInput" accept="image/*" hidden>
              </label>
              <button type="button" class="btn btn-sm btn-icon-only" id="clearImageBtn" title="Remove image">&times;</button>
            </div>
            <div class="image-preview" id="imagePreview" style="display:none">
              <img id="previewImg" src="" alt="Preview">
            </div>
          </div>
        </form>
      </section>

      <section class="filter-section">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="active">Active</button>
          <button class="filter-tab" data-filter="purchased">Purchased</button>
        </div>
        <div class="category-tags" id="categoryTags">
          <button class="cat-tag active" data-cat="all">All</button>
          <button class="cat-tag" data-cat="Produce">Produce</button>
          <button class="cat-tag" data-cat="Dairy">Dairy</button>
          <button class="cat-tag" data-cat="Meat">Meat</button>
          <button class="cat-tag" data-cat="Bakery">Bakery</button>
          <button class="cat-tag" data-cat="Frozen">Frozen</button>
          <button class="cat-tag" data-cat="Pantry">Pantry</button>
          <button class="cat-tag" data-cat="Beverages">Beverages</button>
          <button class="cat-tag" data-cat="Household">Household</button>
        </div>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2 id="listTitle">All Items</h2>
          <div class="list-actions">
            <button class="btn btn-sm btn-outline" id="sortBtn">&#8595; Sort</button>
            <button class="btn btn-sm btn-outline" id="downloadBtn">&#128229; Download</button>
            <button class="btn btn-sm btn-danger" id="clearPurchasedBtn" title="Remove all purchased items">Clear Bought</button>
          </div>
        </div>
        <div id="groceryList" class="grocery-list">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">&#129382;</div>
            <h3>Your list is empty</h3>
            <p>Add your first grocery item above!</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Grocify &mdash; Your Smart Grocery Companion</p>
    </footer>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <h3 class="modal-title" id="modalTitle">Confirm</h3>
      <p class="modal-message" id="modalMessage"></p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-btn modal-confirm" id="modalConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
